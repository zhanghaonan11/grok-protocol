<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>运行台 · xAI HTTP</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="top">
    <div class="top-main">
      <div>
        <h1>xAI HTTP 协议控制台</h1>
        <p class="muted">本机 {{ host }}:{{ port }} · 同时仅 1 个批次 · 浏览器只解 Turnstile</p>
      </div>
      <nav class="nav">
        <a href="/" class="{% if active == 'run' %}active{% endif %}">运行台</a>
        <a href="/config" class="{% if active == 'config' %}active{% endif %}">配置中心</a>
        <a href="/credentials" class="{% if active == 'credentials' %}active{% endif %}">凭证列表</a>
      </nav>
    </div>
    <div class="top-status">
      <div id="embeddedBadge" class="badge">内嵌代理: 检测中</div>
      <div id="busyBadge" class="badge">空闲</div>
    </div>
  </header>

  <main class="grid">
    <section class="panel">
      <h2>运行参数</h2>
      <form id="cfgForm" class="form">
        <label>模式
          <select name="run_mode">
            <option value="register_otp">模式1:注册+otp</option>
            <option value="register_sso">模式2:注册+sso转换</option>
          </select>
        </label>
        <label>Turnstile
          <select name="turnstile_provider">
            <option value="local">本地浏览器仅求解</option>
            <option value="capsolver">CapSolver</option>
            <option value="2captcha">2Captcha</option>
            <option value="yescaptcha">YesCaptcha</option>
          </select>
        </label>
        <label class="check"><input type="checkbox" name="turnstile_headless" /> 无头(local→Xvfb virtual-headed)</label>
        <label>注册数量 <input type="number" name="count" min="1" max="99999999" value="1" /></label>
        <label>并发数 <input type="number" name="workers" min="1" max="32" value="1" /></label>
        <label>代理模式
          <select name="proxy_mode">
            <option value="auto">自动</option>
            <option value="none">不使用</option>
            <option value="direct">直连代理</option>
            <option value="pool">代理池</option>
          </select>
        </label>
        <label>OAuth 输出目录 <input type="text" name="output_dir" /></label>
        <label>SSO 重试 <input type="number" name="sso_convert_retries" min="1" max="20" value="5" /></label>
        <label>SSO 冷却秒 <input type="number" name="sso_convert_cooldown" min="0" max="120" value="3" /></label>
        <p class="muted" id="emailProvider">邮箱: -</p>
        <p class="muted">API Key / 代理池正文请到「配置中心」管理。</p>
      </form>
      <div class="actions">
        <button type="button" id="btnReload">重载配置</button>
        <button type="button" id="btnSave">保存运行参数</button>
        <button type="button" id="btnStart" class="primary">开始</button>
        <button type="button" id="btnStop">停止</button>
        <button type="button" id="btnBrowser">浏览器状态</button>
        <button type="button" id="btnCleanup">清理残留</button>
      </div>
      <p id="message" class="msg"></p>
    </section>

    <section class="panel">
      <h2>内嵌代理</h2>
      <p class="muted" id="embeddedProxySummaryRun">状态: 等待启动</p>
      <pre id="embeddedProxyStatusRun" class="box small">尚未查询</pre>
    </section>

    <section class="panel">
      <h2>进度</h2>
      <div id="progressStats" class="stats">等待启动</div>
      <div class="bar"><div id="progressBar"></div></div>
      <h3>失败汇总</h3>
      <pre id="failureBox" class="box">-</pre>
      <h3>Workers</h3>
      <div id="workerTable" class="box small">-</div>
    </section>

    <section class="panel wide">
      <h2>实时日志</h2>
      <div class="actions">
        <label class="check"><input type="checkbox" id="liveLogs" /> 实时日志</label>
        <label class="check"><input type="checkbox" id="autoScroll" checked /> 自动滚底</label>
        <button type="button" id="btnClearLog">清空显示</button>
      </div>
      <p class="muted" id="logHint">默认关闭实时日志，避免批次运行时卡顿；进度仍会自动刷新。</p>
      <pre id="logBox" class="log">实时日志已关闭（只显示进度）</pre>
    </section>

    <section class="panel wide">
      <h2>历史运行</h2>
      <button type="button" id="btnRefreshHistory">刷新历史</button>
      <div id="historyList" class="box"></div>
      <pre id="historyDetail" class="box log"></pre>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
